services:
  - type: web
    name: web-portfolio-contact-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CONTACT_RECEIVER_EMAIL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_FALLBACK_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
