services:
  - type: web
    name: web-portfolio-contact-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CONTACT_RECEIVER_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
